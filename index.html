<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>东坡行旅图 | 山河叙事地图</title>
  <meta name="description" content="用真实中国山河地图讲述苏轼一生行旅、作品与心境。">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="vendor/maplibre-gl.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main id="app">
    <div id="map" aria-label="苏轼生平山河地图"></div>
    <div class="paper"></div>
    <div class="vignette"></div>
    <canvas id="mist"></canvas>

    <header class="titlebar">
      <p>真实山河 · 文学行旅 · 可漫游叙事地图</p>
      <h1>东坡行旅图</h1>
      <p>从眉山到儋州，把苏轼的一生落回山川与江河</p>
    </header>

    <nav class="toolbar" aria-label="地图工具">
      <button id="homeBtn" type="button" title="回到全国">归</button>
      <button id="tourBtn" type="button" title="按时间巡游">巡</button>
      <button id="projectionBtn" type="button" title="切换地球/平面投影">球</button>
      <button id="terrainBtn" type="button" title="切换立体地形">山</button>
    </nav>

    <section class="search" aria-label="搜索地点或作品">
      <label for="searchInput">搜地点 / 诗文</label>
      <div>
        <input id="searchInput" type="search" autocomplete="off" placeholder="黄州、赤壁赋、荔枝">
        <button id="searchClear" type="button" aria-label="清空搜索">清</button>
      </div>
      <div id="searchResults" class="search-results" hidden></div>
    </section>

    <section class="filters" aria-label="筛选">
      <button class="filter on" type="button" data-filter="all">全部</button>
      <button class="filter" type="button" data-filter="origin">故乡</button>
      <button class="filter" type="button" data-filter="office">仕宦</button>
      <button class="filter" type="button" data-filter="exile">贬谪</button>
      <button class="filter" type="button" data-filter="final">归途</button>
    </section>

    <aside class="story" aria-live="polite">
      <div class="story-head">
        <span id="storyYears">1037-1101</span>
        <strong id="storyTitle">苏轼生平节点</strong>
      </div>
      <p id="storyText">点击地图上的竖牌，查看地点、诗句与生平事件；也可以点“巡”按时间飞行。</p>
      <div id="storyWorks" class="works"></div>
      <blockquote id="storyQuote">竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。</blockquote>
      <div class="progress">
        <span id="progressText">第 1 / 11 站</span>
        <i><b id="progressBar"></b></i>
      </div>
      <div class="story-actions">
        <button id="prevBtn" type="button">上一站</button>
        <button id="nextBtn" type="button">下一站</button>
      </div>
    </aside>

    <ol id="timeline" class="timeline" aria-label="苏轼生平时间线"></ol>

    <div id="loader" class="loader">
      <div>
        <strong>铺开山河画卷</strong>
        <span>正在载入中国边界、水系与东坡行旅节点</span>
      </div>
    </div>
  </main>

  <script src="vendor/maplibre-gl.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
