<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="山河列传 · Atlas of Lives">
  <title>山河列传 · Atlas of Lives</title>
  <defs>
    <clipPath id="globe"><circle cx="50" cy="50" r="45.5"/></clipPath>
  </defs>

  <!-- globe face -->
  <circle cx="50" cy="50" r="47" fill="#f8efd9"/>

  <g clip-path="url(#globe)">
    <!-- meridians / latitudes -->
    <g fill="none" stroke="#bd9a55" stroke-width="1.1" opacity="0.5">
      <ellipse cx="50" cy="50" rx="30" ry="45"/>
      <ellipse cx="50" cy="50" rx="14" ry="45"/>
      <line x1="6" y1="34" x2="94" y2="34"/>
      <line x1="3" y1="50" x2="97" y2="50"/>
      <line x1="6" y1="66" x2="94" y2="66"/>
    </g>

    <!-- 山 — back range -->
    <path d="M0,64 L14,54 L24,59 L36,46 L48,58 L60,50 L74,60 L100,64 Z" fill="#7d6536"/>
    <!-- 山 — front range -->
    <path d="M0,64 L20,52 L31,58 L45,38 L57,55 L70,47 L86,59 L100,64 Z" fill="#432f16"/>

    <!-- 河 — river -->
    <g fill="none" stroke-linecap="round">
      <path d="M6,73 C22,68 32,79 50,73 S80,68 94,74" stroke="#296c67" stroke-width="2.1"/>
      <path d="M16,84 C30,80 40,88 56,83 S82,79 90,84" stroke="#bd9a55" stroke-width="1.5" opacity="0.7"/>
    </g>
  </g>

  <!-- globe rim -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#432f16" stroke-width="3"/>

  <!-- journey pin (cinnabar) on the highest peak -->
  <path d="M45,39 L40,29 A6,6 0 1 1 50,29 Z" fill="#9c2f1b"/>
  <circle cx="45" cy="28" r="2.6" fill="#f8efd9"/>
</svg>
